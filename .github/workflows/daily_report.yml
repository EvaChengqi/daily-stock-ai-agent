name: Daily Stock Agent (Save to Repo)

on:
  schedule:
    - cron: '0 20 * * 1-5'
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    # 1. 拉取仓库代码
    - name: Check out repository code
      uses: actions/checkout@v3

    # 2. 明确配置最新的 Python 3.11 环境，避开未来的版本过期警告
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

- name: Install Latest Gemini GenAI SDK and Quant Tools
      run: |
        python -m pip install --upgrade pip
        python -m pip install google-genai yfinance matplotlib pandas lxml tables openpyxl

    # 4. 运行 Agent 脚本
    - name: Execute Daily Agent Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python daily_stock_agent.py

    # 5. 自动把新文件推送到你的 GitHub 仓库
    - name: Commit and Push Report
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add reports/*.md
        git diff --quiet && git diff --staged --quiet || (git commit -m "Add daily report $(date +'%Y-%m-%d')" && git push)
