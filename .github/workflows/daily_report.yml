name: Daily Stock Agent (Save to Repo)

on:
  schedule:
    # 美东时间每天下午 16:00 (收盘时间) 自动触发
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    # 1. 拉取仓库代码
    - name: Check out repository code
      uses: actions/checkout@v3

    # 2. 配置 Python 3.11 环境
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # 3. 【精准修复】在安装依赖末尾加上 tabulate
    - name: Install Latest SDK and Quant Tools
      run: |
        python -m pip install --upgrade pip
        python -m pip install google-genai yfinance matplotlib pandas lxml tabulate

    # 4. 运行 Agent 脚本
    - name: Execute Daily Agent Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python daily_stock_agent.py

    # 5. 自动把新生成的报告文件和 assets 图片推送到你的 GitHub 仓库
    - name: Commit and Push Report
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add reports/*.md reports/assets/*.png || true
        git diff --quiet && git diff --staged --quiet || (git commit -m "Add daily report with charts $(date +'%Y-%m-%d')" && git push)
